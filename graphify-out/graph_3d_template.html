<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>SFIT - Grafo 3D</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: #e5e5e5; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
  #graph3d { width: 100vw; height: 100vh; }
  .panel { position: fixed; background: rgba(15,15,15,.88); backdrop-filter: blur(8px); border: 1px solid #2a2a2a; padding: 10px 14px; border-radius: 10px; z-index: 10; font-size: 12px; line-height: 1.55; box-shadow: 0 4px 18px rgba(0,0,0,.35); }
  #panel-left  { top: 12px; left: 12px; max-width: 380px; }
  #panel-right { top: 12px; right: 12px; }
  #panel-bottom{ bottom: 12px; left: 12px; font-size: 11px; }
  #panel-legend{ bottom: 12px; right: 12px; max-width: 260px; }
  #panel-left b { color: #93c5fd; }
  #q { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 7px 10px; border-radius: 5px; width: 260px; font-size: 13px; }
  #q:focus { outline: 1px solid #3b82f6; }
  select { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 5px 8px; border-radius: 4px; margin-left: 6px; font-size: 12px; }
  .chip { display: inline-block; background: #1f2937; padding: 2px 8px; border-radius: 999px; margin: 2px 4px 2px 0; font-size: 11px; }
  .chip.hub { background: #7c2d12; color: #fdba74; }
  kbd { background: #1f2937; padding: 1px 5px; border-radius: 3px; font-size: 11px; border: 1px solid #374151; }
  label { user-select: none; }
  .legend-row { display: flex; align-items: center; gap: 7px; margin-top: 4px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-line { width: 18px; height: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="graph3d"></div>

<div id="panel-left" class="panel"><div><b>Cargando...</b></div></div>

<div id="panel-right" class="panel">
  <input id="q" placeholder="Buscar nodo (ej. requireRole, connectDB)...">
  <div style="margin-top:8px; font-size:11px; color:#9ca3af;">
    Filtro: <select id="filter"><option value="all">Todas las comunidades</option></select>
  </div>
  <div style="margin-top:6px; font-size:11px; color:#9ca3af;">
    <label><input type="checkbox" id="trim" checked> ocultar grado &le; 1</label>
    <label style="margin-left:10px;"><input type="checkbox" id="particles" checked> partículas</label>
  </div>
</div>

<div id="panel-legend" class="panel">
  <div style="font-weight:700; color:#93c5fd; margin-bottom:4px;">Lectura visual</div>
  <div class="legend-row"><span class="legend-dot" style="background:#fdba74; box-shadow: 0 0 6px #fdba74;"></span>Hub (god node)</div>
  <div class="legend-row"><span class="legend-line" style="background:#a78bfa;"></span>Enlace intra-comunidad</div>
  <div class="legend-row"><span class="legend-line" style="background:#e5e7eb;"></span>Enlace cruza comunidades</div>
  <div class="legend-row" style="color:#9ca3af; font-size:10.5px; margin-top:6px;">Hover: aísla incidencias.<br>Tamaño nodo ∝ degree.</div>
</div>

<div id="panel-bottom" class="panel">
  <kbd>L-drag</kbd> rotar &middot; <kbd>R-drag</kbd> mover &middot; <kbd>rueda</kbd> zoom &middot; <kbd>click</kbd> nodo &middot; <kbd>F</kbd> fit
</div>

<script id="graphData" type="application/json">__GRAPH_DATA__</script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>
<script>
const raw = JSON.parse(document.getElementById('graphData').textContent);
const palette = ['#60a5fa','#f472b6','#34d399','#fbbf24','#a78bfa','#fb923c','#22d3ee','#f87171','#4ade80','#e879f9','#facc15','#818cf8','#94a3b8','#fb7185','#2dd4bf','#c084fc','#fca5a5','#86efac','#67e8f9','#d8b4fe'];
const colorFor = (c) => palette[Math.abs(c) % palette.length];
const labelInfo = (n) => `${n.label}${n.is_hub ? ' <span style="color:#fdba74;">(hub)</span>' : ''}<br><small style="color:#9ca3af;">${n.community_label} &middot; deg ${n.degree}</small><br><small style="color:#6b7280;">${n.source_file}</small>`;

// Tamaño del nodo: log-ish para que god nodes (200+ degree) destaquen
// claramente sobre nodos pequeños (degree 1-3) sin que dominen el frame.
function nodeVal(n) {
  const d = n.degree || 1;
  return n.is_hub ? Math.max(6, Math.log2(d) * 1.6) : Math.max(0.6, Math.sqrt(d));
}

const allNodes = raw.nodes.map(n => ({
  ...n,
  val: nodeVal(n),
  color: colorFor(n.community),
}));
const allLinks = raw.links;

// Index por id para resolver source/target rápido en hover.
const nodeById = new Map(allNodes.map(n => [n.id, n]));

// Estado de highlight (hover/click).
let hoverNode = null;
const hlNodes = new Set();
const hlLinks = new Set();

function rebuildHighlight() {
  hlNodes.clear();
  hlLinks.clear();
  if (!hoverNode) return;
  hlNodes.add(hoverNode.id);
  // Iterar sobre la copia VIVA de links (Graph.graphData()) — ya tienen
  // source/target como objetos.
  Graph.graphData().links.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (s === hoverNode.id || t === hoverNode.id) {
      hlLinks.add(l);
      hlNodes.add(s);
      hlNodes.add(t);
    }
  });
}

const hubsCount = allNodes.filter(n => n.is_hub).length;
const crossCount = allLinks.filter(l => l.cross_community).length;

document.getElementById('panel-left').innerHTML =
  `<b>SFIT - Grafo 3D</b><br>` +
  `${allNodes.length} nodos &middot; ${allLinks.length} aristas<br>` +
  `<small style="color:#9ca3af;">${hubsCount} hubs &middot; ${crossCount} enlaces inter-comunidad</small><br>` +
  `<small style="color:#9ca3af;">Click nodo para detalles. Hover para aislar.</small>`;

const counts = {};
allNodes.forEach(n => counts[n.community] = (counts[n.community]||0)+1);
const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 30);
const sel = document.getElementById('filter');
sorted.forEach(([cid, n]) => {
  const c = allNodes.find(x => x.community == cid);
  const opt = document.createElement('option');
  opt.value = cid; opt.textContent = `C${cid} - ${c.community_label} (${n})`;
  sel.appendChild(opt);
});

// Convierte hex (#RRGGBB) a "rgba(r,g,b,a)" para opacidades dinámicas.
function rgba(hex, alpha) {
  const v = hex.replace('#','');
  const r = parseInt(v.slice(0,2), 16);
  const g = parseInt(v.slice(2,4), 16);
  const b = parseInt(v.slice(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

const Graph = ForceGraph3D()(document.getElementById('graph3d'))
  .backgroundColor('#0a0a0a')
  .nodeLabel(labelInfo)
  .nodeRelSize(3.4)
  .nodeOpacity(0.95)
  // Halo brillante en hubs: usa nodeThreeObject para reemplazar la
  // esfera por defecto con una esfera + glow sprite. Sólo para hubs
  // para no penalizar el render con miles de sprites.
  .nodeThreeObject(node => {
    if (!node.is_hub) return null; // null => usa render por defecto
    const group = new THREE.Group();
    const baseColor = node.color;
    const sphereSize = node.val * 1.0;
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(sphereSize, 16, 16),
      new THREE.MeshBasicMaterial({ color: baseColor })
    );
    group.add(sphere);
    // Glow/halo: sprite con material aditivo.
    const haloTex = makeGlowTexture(baseColor);
    const halo = new THREE.Sprite(new THREE.SpriteMaterial({
      map: haloTex, color: 0xffffff, blending: THREE.AdditiveBlending,
      transparent: true, opacity: 0.6, depthWrite: false,
    }));
    halo.scale.set(sphereSize * 6, sphereSize * 6, 1);
    group.add(halo);
    return group;
  })
  .nodeThreeObjectExtend(false)
  // Color del enlace: cross-community en blanco brillante (visible),
  // intra-community heredan el color de la comunidad source. Hover
  // resalta los incidentes y atenúa el resto.
  .linkColor(link => {
    const isHl = hlLinks.has(link);
    const dim = hoverNode && !isHl;
    if (link.cross_community) {
      return isHl ? 'rgba(255,255,255,0.95)'
        : dim ? 'rgba(229,231,235,0.05)'
        : 'rgba(229,231,235,0.42)';
    }
    const baseHex = colorFor(link.src_community);
    return isHl ? rgba(baseHex, 0.98)
      : dim ? rgba(baseHex, 0.06)
      : rgba(baseHex, 0.55);
  })
  .linkWidth(link => {
    const isHl = hlLinks.has(link);
    const w = (link.weight || 1) * 0.4;
    return isHl ? Math.max(2.2, w * 1.8) : w;
  })
  .linkOpacity(0.85)
  .linkDirectionalArrowLength(link => hlLinks.has(link) ? 4 : 2.2)
  .linkDirectionalArrowRelPos(0.96)
  .linkDirectionalArrowColor(link => link.cross_community ? '#ffffff' : colorFor(link.src_community))
  // Partículas direccionales: efecto visual que muestra "flujo" en los
  // enlaces. Sólo activas en cross-community + hover (rendimiento).
  .linkDirectionalParticles(link => {
    if (!particlesEnabled) return 0;
    if (hlLinks.has(link)) return 4;
    if (link.cross_community && !hoverNode) return 1;
    return 0;
  })
  .linkDirectionalParticleSpeed(0.008)
  .linkDirectionalParticleWidth(link => hlLinks.has(link) ? 2.8 : 1.6)
  .linkDirectionalParticleColor(link =>
    link.cross_community ? '#ffffff' : colorFor(link.src_community))
  .onNodeHover(node => {
    hoverNode = node || null;
    rebuildHighlight();
    document.body.style.cursor = node ? 'pointer' : 'default';
    // Refrescar render para que se aplique la nueva paleta.
    Graph.refresh();
  })
  .onNodeClick(node => {
    const neighbors = Graph.graphData().links.filter(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return s === node.id || t === node.id;
    }).length;
    document.getElementById('panel-left').innerHTML =
      `<div><b>${node.label}</b></div>` +
      `<div class="chip">${node.community_label}</div>` +
      `<div class="chip">deg ${node.degree}</div>` +
      `<div class="chip">${node.file_type || 'code'}</div>` +
      (node.is_hub ? `<div class="chip hub">HUB</div>` : '') +
      `<div style="margin-top:6px; color:#9ca3af; font-size:11px;">${node.source_file}</div>` +
      `<div style="margin-top:8px; font-size:11px; color:#6b7280;">vecinos visibles: ${neighbors}</div>`;
    const dist = 60;
    const r = 1 + dist/Math.hypot(node.x||1, node.y||1, node.z||1);
    Graph.cameraPosition({ x:(node.x||0)*r, y:(node.y||0)*r, z:(node.z||0)*r }, node, 1200);
  });

// Forces ajustadas para que las comunidades formen racimos visibles.
// Charge más negativo = nodos se repelen más; link distance variable
// según peso del enlace.
Graph.d3Force('charge').strength(-32);
Graph.d3Force('link').distance(link => 30 + (link.cross_community ? 60 : 0));

// Genera una textura radial blanco→transparente para el halo de los
// hubs. Cacheada por color.
const _haloTexCache = new Map();
function makeGlowTexture(colorStr) {
  if (_haloTexCache.has(colorStr)) return _haloTexCache.get(colorStr);
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const grd = ctx.createRadialGradient(size/2, size/2, 4, size/2, size/2, size/2);
  grd.addColorStop(0.0, colorStr);
  grd.addColorStop(0.35, colorStr + '88');
  grd.addColorStop(1.0, '#00000000');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  _haloTexCache.set(colorStr, tex);
  return tex;
}

let particlesEnabled = true;

function applyFilter() {
  const cid = sel.value;
  const trim = document.getElementById('trim').checked;
  let nodes = allNodes, links = allLinks;
  if (cid !== 'all') {
    const cidNum = parseInt(cid);
    const keep = new Set(allNodes.filter(n => n.community === cidNum).map(n => n.id));
    allLinks.forEach(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      if (keep.has(s) || keep.has(t)) { keep.add(s); keep.add(t); }
    });
    nodes = allNodes.filter(n => keep.has(n.id));
    links = allLinks.filter(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return keep.has(s) && keep.has(t);
    });
  }
  if (trim) nodes = nodes.filter(n => n.degree > 1);
  const ids = new Set(nodes.map(n => n.id));
  links = links.filter(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return ids.has(s) && ids.has(t);
  });
  Graph.graphData({ nodes: nodes.map(n => ({...n})), links: links.map(l => ({...l})) });
}

sel.addEventListener('change', applyFilter);
document.getElementById('trim').addEventListener('change', applyFilter);
document.getElementById('particles').addEventListener('change', (e) => {
  particlesEnabled = e.target.checked;
  Graph.refresh();
});
applyFilter();

document.getElementById('q').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (q.length < 3) return;
  const match = allNodes.find(n => (n.label||'').toLowerCase().includes(q));
  if (!match) return;
  const live = Graph.graphData().nodes.find(n => n.id === match.id);
  if (!live) {
    document.getElementById('panel-left').innerHTML = `<b>${match.label}</b> esta filtrado.<br><small>Cambia filtro a 'Todas'.</small>`;
    return;
  }
  const r = 1 + 60/Math.hypot(live.x||1, live.y||1, live.z||1);
  Graph.cameraPosition({ x:(live.x||0)*r, y:(live.y||0)*r, z:(live.z||0)*r }, live, 1200);
  document.getElementById('panel-left').innerHTML = `<b>${match.label}</b><br><div class="chip">${match.community_label}</div><div class="chip">deg ${match.degree}</div>${match.is_hub ? '<div class="chip hub">HUB</div>' : ''}<br><small>${match.source_file}</small>`;
});

window.addEventListener('keydown', (e) => {
  if (e.key === 'f' || e.key === 'F') Graph.zoomToFit(800);
});
</script>
</body>
</html>
