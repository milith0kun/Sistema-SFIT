name: sfit_app
description: "SFIT — Sistema de Fiscalización Inteligente de Transporte. App móvil para fiscalización y gestión de flota vehicular municipal."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  lottie: ^3.3.1

  # Navigation
  go_router: ^15.1.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking & API
  dio: ^5.8.0+1
  retrofit: ">=4.4.2 <4.9.0"

  # Auth
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^6.2.2

  # Local Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1

  # Camera & Image
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Location
  geolocator: ^14.0.0

  # Notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # Real-time
  socket_io_client: ^3.0.2

  # Crypto (HMAC-SHA256 for QR)
  crypto: ^3.0.6

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  logger: ^2.5.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.2
  json_serializable: ^6.9.4
  retrofit_generator: ^9.1.10
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
